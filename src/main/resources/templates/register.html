<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Register Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container mt-5">
    <div class="card mx-auto" style="max-width: 500px;">
        <div class="card-header bg-primary text-white text-center">
            <h3>Add New Employee</h3>
        </div>
        <div class="card-body">
            <div th:if="${param.alreadyExists}" class="alert alert-danger alert-dismissible fade show" role="alert">
                <strong>Wait!</strong> This email is already registered to another employee.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div th:if="${param.error}" class="alert alert-warning alert-dismissible fade show" role="alert">
                <strong>Error!</strong> Something went wrong. Please check your data and try again.
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <form th:action="@{/saveEmployee}" method="post">
                <div class="mb-3">
                    <label>Employee Name</label>
                    <input type="text" name="name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Employee Email</label>
                    <input type="email" name="email" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label>Salary</label>
                    <input type="number" name="salary" class="form-control" step="0.01" required>
                </div>
                <button type="submit" class="btn btn-success w-100">Save Employee</button>
            </form>
        </div> </div> </div> <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
