<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Edit Employee</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f0f2f5;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .edit-card {
            border: none;
            border-radius: 15px;
            overflow: hidden;
        }
        .card-header-custom {
            /* Matches your dashboard "Account Details" blue theme */
            background: linear-gradient(45deg, #0dcaf0, #0d6efd);
            color: white;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .form-control:focus {
            border-color: #0dcaf0;
            box-shadow: 0 0 0 0.25rem rgba(13, 202, 240, 0.25);
        }
        .btn-update {
            background-color: #198754; /* Matches your dashboard "Salary" green theme */
            border: none;
            transition: 0.3s;
        }
        .btn-update:hover {
            background-color: #146c43;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">

            <div class="card edit-card shadow-lg">
                <div class="card-header card-header-custom py-3 text-center">
                    <h4 class="mb-0">Edit Employee Profile</h4>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{/update}" th:object="${employee}" method="post">
                        <input type="hidden" th:field="*{id}">
                        <input type="hidden" th:field="*{password}">

                        <div class="mb-3">
                            <label class="form-label fw-bold">Full Name</label>
                            <input type="text" th:field="*{name}" class="form-control form-control-lg" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-bold">Email Address</label>
                            <input type="email" th:field="*{email}" class="form-control bg-light" readonly>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-bold">Monthly Salary</label>
                            <div class="input-group">
                                <span class="input-group-text bg-success text-white">$</span>
                                <input type="number" th:field="*{salary}" class="form-control border-success"
                                       step="0.01" min="0" required>
                            </div>
                        </div>

                        <div class="d-grid gap-2">
                            <button type="submit" class="btn btn-update btn-lg text-white">Save Changes</button>
                            <a th:href="@{/dashboard}" class="btn btn-outline-secondary">Back to Dashboard</a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</div>
</body>
</html>
