
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">Employee Management</span>
        <form th:action="@{/logout}" method="post">
            <button class="btn btn-outline-danger btn-sm" type="submit">Logout</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="jumbotron bg-light p-5 rounded border">
        <h1>Welcome, <span th:text="${employee.name}">User</span>!</h1>
        <hr class="my-4">
        <div class="row">
            <div class="col-md-6">
                <div class="card border-info">
                    <div class="card-body">
                        <h5 class="card-title text-info">Account Details</h5>
                        <p class="card-text"><strong>Email:</strong> <span th:text="${employee.email}">Email</span></p>
                    </div>
                </div>
            </div>
            <div class="col-md-6">
                <div class="card border-success">
                    <div class="card-body text-center">
                        <h5 class="card-title text-success">Monthly Salary</h5>
                        <h2 class="display-4 font-weight-bold">$<span th:text="${employee.salary}">0.00</span></h2>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
