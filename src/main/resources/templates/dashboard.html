<div class="container mt-5">
    <h2>Welcome, <span th:text="${employee.name}">User</span>!</h2>
    <div class="row mt-4">
        <div class="col-md-4">
            <div class="card text-white bg-info mb-3">
                <div class="card-header">Current Salary</div>
                <div class="card-body">
                    <h5 class="card-title">$ <span th:text="${employee.salary}">0.00</span></h5>
                    <p class="card-text">Monthly basic pay before taxes.</p>
                </div>
            </div>
        </div>
    </div>
    <form th:action="@{/logout}" method="post">
        <button class="btn btn-danger">Log Out</button>
    </form>
</div>
